<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Independent research analysis visualization">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#heroGrad)"/>
  
  <!-- Background grid -->
  <g stroke="#475569" stroke-width="1" opacity="0.25">
    <line x1="100" y1="0" x2="100" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="500" y1="0" x2="500" y2="800"/>
    <line x1="700" y1="0" x2="700" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="800"/>
    <line x1="1100" y1="0" x2="1100" y2="800"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
  </g>
  
  <!-- Central bar chart -->
  <g transform="translate(250, 150)" filter="url(#glow)">
    <rect x="50" y="280" width="80" height="220" rx="4" fill="#C9A227" opacity="0.9"/>
    <rect x="170" y="180" width="80" height="320" rx="4" fill="#64748B" opacity="0.9"/>
    <rect x="290" y="340" width="80" height="160" rx="4" fill="#C9A227" opacity="0.7"/>
    <rect x="410" y="220" width="80" height="280" rx="4" fill="#64748B" opacity="0.8"/>
    <rect x="530" y="120" width="80" height="380" rx="4" fill="#C9A227" opacity="1"/>
  </g>
  
  <!-- Trend line -->
  <polyline points="250,520 400,450 550,480 700,380 850,420 1000,300" fill="none" stroke="#FAF9F6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  
  <!-- Data nodes -->
  <circle cx="250" cy="520" r="8" fill="#FAF9F6"/>
  <circle cx="400" cy="450" r="8" fill="#FAF9F6"/>
  <circle cx="550" cy="480" r="8" fill="#FAF9F6"/>
  <circle cx="700" cy="380" r="8" fill="#FAF9F6"/>
  <circle cx="850" cy="420" r="8" fill="#FAF9F6"/>
  <circle cx="1000" cy="300" r="10" fill="#C9A227"/>
  
  <!-- Connecting network -->
  <g stroke="#C9A227" stroke-width="2" opacity="0.4">
    <line x1="150" y1="200" x2="300" y2="300"/>
    <line x1="300" y1="300" x2="500" y2="250"/>
    <line x1="500" y1="250" x2="700" y2="350"/>
    <line x1="700" y1="350" x2="950" y2="200"/>
  </g>
  <circle cx="150" cy="200" r="6" fill="#C9A227"/>
  <circle cx="300" cy="300" r="6" fill="#C9A227"/>
  <circle cx="500" cy="250" r="6" fill="#C9A227"/>
  <circle cx="700" cy="350" r="6" fill="#C9A227"/>
  <circle cx="950" cy="200" r="6" fill="#C9A227"/>
  
  <!-- Bottom evidence labels -->
  <g transform="translate(150, 680)">
    <rect x="0" y="0" width="180" height="50" rx="8" fill="#334155" stroke="#C9A227" stroke-width="2"/>
    <text x="90" y="32" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="16" font-weight="600" fill="#FAF9F6">Verified Proof</text>
  </g>
  <g transform="translate(420, 680)">
    <rect x="0" y="0" width="220" height="50" rx="8" fill="#334155" stroke="#64748B" stroke-width="2"/>
    <text x="110" y="32" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="16" font-weight="600" fill="#FAF9F6">Unverified Assertion</text>
  </g>
  <g transform="translate(730, 680)">
    <rect x="0" y="0" width="180" height="50" rx="8" fill="#334155" stroke="#94a3b8" stroke-width="2"/>
    <text x="90" y="32" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="16" font-weight="600" fill="#FAF9F6">Proof Gap</text>
  </g>
</svg>
