<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Identity verification infrastructure benchmark">
  <defs>
    <linearGradient id="idvGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#idvGrad)"/>
  
  <!-- Grid -->
  <g stroke="#475569" stroke-width="1" opacity="0.2">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  
  <!-- Central shield / identity icon -->
  <g transform="translate(400, 280)">
    <path d="M0,-110 C40,-90 90,-70 110,-30 C110,50 60,110 0,140 C-60,110 -110,50 -110,-30 C-90,-70 -40,-90 0,-110 Z" fill="#334155" stroke="#C9A227" stroke-width="4"/>
    <circle cx="0" cy="-20" r="35" fill="none" stroke="#FAF9F6" stroke-width="4"/>
    <circle cx="0" cy="-20" r="12" fill="#FAF9F6"/>
    <path d="M-25,35 Q0,60 25,35" fill="none" stroke="#C9A227" stroke-width="4" stroke-linecap="round"/>
    <path d="M-35,20 L-15,40 L-35,60" fill="none" stroke="#C9A227" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M35,20 L15,40 L35,60" fill="none" stroke="#C9A227" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Verification badges -->
  <g transform="translate(120, 480)">
    <rect x="0" y="0" width="160" height="50" rx="8" fill="#334155" stroke="#C9A227" stroke-width="2"/>
    <text x="80" y="32" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="14" font-weight="600" fill="#FAF9F6">Verified Proof</text>
  </g>
  <g transform="translate(320, 480)">
    <rect x="0" y="0" width="160" height="50" rx="8" fill="#334155" stroke="#64748B" stroke-width="2"/>
    <text x="80" y="32" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="14" font-weight="600" fill="#FAF9F6">Proof Gap</text>
  </g>
  <g transform="translate(520, 480)">
    <rect x="0" y="0" width="160" height="50" rx="8" fill="#334155" stroke="#94a3b8" stroke-width="2"/>
    <text x="80" y="32" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="14" font-weight="600" fill="#FAF9F6">Q3 2026</text>
  </g>
  
  <!-- Top label -->
  <text x="400" y="80" text-anchor="middle" font-family="Lora, Georgia, serif" font-size="24" font-weight="700" fill="#FAF9F6">Identity Verification</text>
  <text x="400" y="110" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="14" fill="#C9A227">Benchmark · Transparency · Proof</text>
</svg>
